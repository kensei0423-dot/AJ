<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJCloud - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border: 1.5px solid #e0e0e0;
            border-radius: 16px;
            padding: 40px 36px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .logo .aj { color: #333; }
        .logo .cloud { color: #7ab648; }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: #f9f9f9;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            color: #333;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #7ab648;
        }

        .form-input::placeholder {
            color: #bbb;
        }

        .confirm-group {
            display: none;
        }

        .confirm-group.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7ab648, #5a9a2e);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s;
            margin-top: 6px;
        }

        .submit-btn:hover {
            filter: brightness(1.1);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            display: none;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 13px;
            font-weight: 500;
        }

        .message.error {
            display: block;
            background: rgba(229, 57, 53, 0.08);
            border: 1px solid #e53935;
            color: #d32f2f;
        }

        .message.success {
            display: block;
            background: rgba(122, 182, 72, 0.08);
            border: 1px solid #7ab648;
            color: #5a9a2e;
        }

        .toggle {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #999;
        }

        .toggle a {
            color: #7ab648;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">
            <div class="logo"><span class="aj">AJ</span><span class="cloud">CLOUD</span></div>
        </div>
        <div class="subtitle" id="subtitle">Sign in to your account</div>

        <div class="message" id="message"></div>

        <form onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <div class="form-group confirm-group" id="confirm-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" id="confirm-password" placeholder="Confirm password" autocomplete="new-password">
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
        </form>

        <div class="toggle">
            <span id="toggle-text">Don't have an account?</span>
            <a onclick="toggleMode()" id="toggle-link">Register</a>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            clearMessage();

            document.getElementById('subtitle').textContent =
                isLoginMode ? 'Sign in to your account' : 'Create your account';
            document.getElementById('submit-btn').textContent =
                isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('toggle-text').textContent =
                isLoginMode ? "Don't have an account?" : 'Already have an account?';
            document.getElementById('toggle-link').textContent =
                isLoginMode ? 'Register' : 'Sign In';
            document.getElementById('confirm-group').classList.toggle('show', !isLoginMode);

            // Update autocomplete hints
            document.getElementById('password').autocomplete =
                isLoginMode ? 'current-password' : 'new-password';
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        function clearMessage() {
            document.getElementById('message').className = 'message';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            clearMessage();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');

            if (!username || !password) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            if (!isLoginMode) {
                const confirmPassword = document.getElementById('confirm-password').value;
                if (password !== confirmPassword) {
                    showMessage('Passwords do not match.', 'error');
                    return;
                }
            }

            btn.disabled = true;

            try {
                const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage(isLoginMode ? 'Login successful!' : 'Account created!', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    showMessage(data.error || 'An error occurred.', 'error');
                }
            } catch (err) {
                showMessage('Network error. Please try again.', 'error');
            }

            btn.disabled = false;
        }
    </script>

</body>
</html>
